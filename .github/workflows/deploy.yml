name: ⚛️ Deploy Estevez MotosApp React to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create production env
        run: |
          printf "%s" "${{ secrets.REACT_ENV }}" > .env.production

      - name: Install dependencies
        run: npm ci

      - name: Build React Vite
        run: npm run build

      - name: Upload dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          source: "dist/*"
          target: "/tmp/estevez_motosapp_build"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -e

            mkdir -p /var/www/estevez_motosapp

            rm -rf /var/www/estevez_motosapp/*

            cp -r /tmp/estevez_motosapp_build/dist/* /var/www/estevez_motosapp/

            chown -R www-data:www-data /var/www/estevez_motosapp

            nginx -t

            systemctl reload nginx
            